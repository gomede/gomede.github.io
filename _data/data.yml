career-profile:
    title: Career Profile
    summary: |
      Hello! I’m Everton, Computer Scientist at <a href="https://www.sicoob.com.br/" target="_blank" rel="nofollow">Sicoob</a>, <a href="https://www.solaris.net.br/" target="_blank" rel="nofollow">Solaris</a>, <a href="https://www.produtec.com.br/" target="_blank" rel="nofollow">Produtec</a> and <a href="https://www.senaipr.org.br/tecnologiaeinovacao/nossarede/hubia/" target="_blank" rel="nofollow">Senai HUB</a> where we develop algorithmic processes, solutions, and tools that enable these companies and its analysts to efficiently extract insights from data and provide solution alternatives to decision-makers.
      
      Previously, I was a Senior Operations Research Analyst at the Sicoob and spent many years developing life cycle forecasting, risk and decision analysis models. 

      I work on applied analytic research, develop data analysis software, create data science educational content, write books, and provide analytic consulting services.

      Besides, I have been working as a Visiting Professor at the University of Maringá, Pontificia Universidad Catolica, FCV, and University of Londrina where I have teaching business analytics and R and Python programming courses. My teaching style is building knowledge from general to specific, simple to complex and example-based method before mathematical formalization. 
      
      I am also reviewer of journals <a href="http://www.mlrjournal.org/" target="_blank" rel="nofollow">Machine Learning Research</a>, ISPRS International Journal of Trends in Computer Science and Information Technology, Geo-Information, Smart Cities, Sensors, International Journal of Environmental Research and Public Health, Applied Sciences, Big Data and Cognitive Computing, and Future Internet.

      Moreover, I have written many technical <a href="https://servicos.cbl.org.br/isbn/pesquisa/?page=1&q=gomede&filtrar_por%5B0%5D=autor&ord%5B0%5D=relevancia&dir%5B0%5D=asc" target="_blank" rel="nofollow">books</a> 
      and scientific papers related to computer science and I have been working as a researcher at <a href="https://www.fee.unicamp.br/" target="_blank" rel="nofollow">FEEC/Unicamp</a>.

      All opinions and views are my own and do not represent my employer(s).

